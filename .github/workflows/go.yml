name: Release Relay

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        platform: [amd64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true

      - name: Update Go modules
        run: |
          go get -u=patch ./...
          go mod tidy

      - name: Build binary
        run: |
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=${{ matrix.platform }}

          go build -ldflags "-w -s" -o zyrln-relay ./relay/vps/main.go

      - name: Prepare package
        run: |
          mkdir release
          cp zyrln-relay release/
          tar -zcvf zyrln-relay-linux-${{ matrix.platform }}.tar.gz release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-relay-${{ matrix.platform }}
          path: zyrln-relay-linux-${{ matrix.platform }}.tar.gz

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        if: |
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: zyrln-relay-linux-${{ matrix.platform }}.tar.gz
          asset_name: zyrln-relay-linux-${{ matrix.platform }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
          prerelease: false
